<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>My To-Do List</h1>

      <!-- Input area -->
      <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a task..." />
        <button id="addBtn">Add</button>
      </div>

      <!-- List of tasks -->
      <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
